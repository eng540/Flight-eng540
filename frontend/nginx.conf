server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Proxy all /api/* and /analytics/* /flights/* /regions/* /stats/* /ingestion/*
    # to the backend service. This allows the frontend to call relative URLs.
    location ~ ^/(api|analytics|flights|airlines|regions|stats|ingestion|docs|openapi.json)/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Also proxy root-level legacy endpoints without trailing slash
    location ~ ^/(analytics|flights|airlines|regions|stats|ingestion)$ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
    }

    # SPA fallback: all other routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|woff2?|png|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
